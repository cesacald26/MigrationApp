<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>NAF Next — Home Page</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --or:#e85d04;--or-dk:#c44d00;--or-lt:#fff3eb;--or-mid:#ffd4bb;
  --blk:#1a1a1a;--blk2:#242424;
  --wh:#fff;--bg:#f0f0f0;
  --g1:#f7f7f7;--g2:#e6e6e6;--g3:#ccc;--g4:#999;
  --tx:#1c1c1c;--tx2:#555;--tx3:#999;
  --sh:0 1px 4px rgba(0,0,0,0.09);--sh-md:0 4px 18px rgba(0,0,0,0.13);--sh-lg:0 8px 32px rgba(0,0,0,0.16);
  --font:'Lato',system-ui,sans-serif;--rad:4px;--radlg:10px;
}
html,body{height:100%;font-family:var(--font);font-size:13px;color:var(--tx);background:var(--bg);overflow:hidden}
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* ═══ SHELL ═══ */
.shell{height:48px;background:var(--blk);display:flex;align-items:center;flex-shrink:0;z-index:300;position:relative}
.sh-logo{padding:0 16px;border-right:1px solid rgba(255,255,255,.09);height:48px;display:flex;align-items:center;gap:9px;flex-shrink:0}
.sh-logo img{height:32px;width:auto;object-fit:contain}
.sh-brand{color:#fff;font-size:14px;font-weight:900;letter-spacing:-.3px}
.sh-brand span{color:var(--or)}
.sh-home{padding:0 14px;height:48px;display:flex;align-items:center;gap:6px;color:rgba(255,255,255,.6);font-size:12.5px;font-weight:700;cursor:pointer;border:none;background:transparent;border-right:1px solid rgba(255,255,255,.09);transition:all .12s;flex-shrink:0;font-family:var(--font)}
.sh-home:hover,.sh-home.on{color:#fff;background:rgba(232,93,4,.15);border-bottom:2.5px solid var(--or)}
.sh-bc{flex:1;display:flex;align-items:center;gap:5px;padding:0 14px;font-size:11.5px}
.bc-a{color:rgba(255,255,255,.45);cursor:pointer;font-weight:700;transition:color .1s}
.bc-a:hover{color:rgba(255,255,255,.85)}
.bc-s{color:rgba(255,255,255,.2)}
.bc-b{color:rgba(255,255,255,.78);font-weight:700}
.bc-c{color:rgba(255,255,255,.45)}
.sh-right{display:flex;align-items:center;gap:2px;padding:0 10px;flex-shrink:0;border-left:1px solid rgba(255,255,255,.09);position:relative}
.sh-ico{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.45);font-size:14px;cursor:pointer;border:none;background:transparent;position:relative;font-family:var(--font);transition:all .12s}
.sh-ico:hover{background:rgba(255,255,255,.08);color:#fff}
.sh-ico.logout{color:rgba(255,255,255,.38)}
.sh-ico.logout:hover{background:rgba(220,53,53,.18)!important;color:#ff6b6b!important}
.sh-emp-selector{position:relative}
.sh-emp-btn{display:flex;align-items:center;gap:7px;padding:4px 10px;border-radius:24px;cursor:pointer;border:none;background:transparent;transition:all .12s;font-family:var(--font)}
.sh-emp-btn:hover{background:rgba(255,255,255,.1)}
.sh-emp-arrow{color:rgba(255,255,255,.4);font-size:10px;margin-left:2px;transition:transform .15s}
.sh-emp-btn.open .sh-emp-arrow{transform:rotate(180deg)}
.sh-emp-nm{color:rgba(255,255,255,.82);font-size:11.5px;font-weight:700;text-align:right;white-space:nowrap}
.sh-emp-rl{color:rgba(255,255,255,.32);font-size:10px;text-align:right}
.sh-av{width:30px;height:30px;border-radius:50%;background:var(--or);color:#fff;font-size:10.5px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.emp-drop{position:absolute;top:48px;right:0;width:280px;background:var(--blk2);border:1px solid rgba(255,255,255,.09);border-radius:12px;box-shadow:var(--sh-lg);z-index:600;display:none}
.emp-drop.open{display:block}
.ed-hdr{padding:8px 13px;font-size:9.5px;font-weight:900;color:rgba(255,255,255,.25);text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid rgba(255,255,255,.07)}
.ed-item{display:flex;align-items:center;gap:9px;padding:9px 13px;cursor:pointer;transition:background .1s;border-bottom:1px solid rgba(255,255,255,.05)}
.ed-item:hover{background:rgba(255,255,255,.06)}
.ed-av{width:26px;height:26px;border-radius:var(--rad);color:#fff;font-size:9.5px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ed-nm{font-size:12px;font-weight:700;color:rgba(255,255,255,.8)}
.ed-ruc{font-size:9.5px;color:rgba(255,255,255,.3)}
.ed-chk{color:var(--or);margin-left:auto;font-size:14px}
.ed-sep{height:1px;background:rgba(255,255,255,.06);margin:4px 0}
.ed-logout{display:flex;align-items:center;gap:9px;padding:9px 13px;cursor:pointer;transition:background .1s;color:rgba(255,100,100,.7);font-size:12px;font-weight:700}
.ed-logout:hover{background:rgba(220,53,53,.1);color:#ff6b6b}

/* ═══ BODY ═══ */
.body{flex:1;display:flex;overflow:hidden}
.content{flex:1;overflow-y:auto;background:var(--bg)}
.content::-webkit-scrollbar{width:5px}.content::-webkit-scrollbar-thumb{background:var(--g2);border-radius:3px}

/* ═══ HOME ═══ */
.hero{background:var(--blk);padding:22px 32px 20px;position:relative}
.hero-row{display:flex;align-items:flex-start;justify-content:space-between;gap:16px}
.hero-left{}
.hero-greet{color:#fff;font-size:20px;font-weight:900;margin-bottom:3px}
.hero-date{color:rgba(255,255,255,.3);font-size:11.5px;margin-bottom:16px}
.emp-info-card{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.05);border-radius:12px;padding:8px 15px}
.ep-av{width:36px;height:36px;border-radius:8px;background:var(--or);color:#fff;font-size:14px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ep-nm{color:#fff;font-size:13px;font-weight:700}
.ep-ruc{color:rgba(255,255,255,.45);font-size:10px}
.hero-kpis{display:flex;gap:9px;flex-wrap:wrap;margin-top:16px}
.kpi{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:var(--radlg);padding:10px 13px;min-width:108px;cursor:pointer;transition:all .15s}
.kpi:hover{background:rgba(255,255,255,.1);transform:translateY(-2px)}
.kpi-v{color:#fff;font-size:18px;font-weight:900;line-height:1}
.kpi-l{color:rgba(255,255,255,.32);font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-top:3px}
.kpi-d{font-size:10px;margin-top:2px}
.up{color:#52c986}.dn{color:#ff7060}.wa{color:#f0a929}.neu{color:rgba(255,255,255,.28)}

.domains{padding:20px 32px 32px}

    margin-bottom: 28px;
}

.dom-hdr {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
}

.dom-ic {
    font-size: 18px;
    flex-shrink: 0;
}

.dom-lbl {
    font-size: 12px;

.agg {
    display: flex;

.ac {
    width: 108px;
    min-height: 96px;
    background: var(--wh);
    border: 1px solid var(--g2);
    border-radius: var(--radlg);
    padding: 12px 8px;
    cursor: pointer;
    transition: all 0.2s ease;
    text-align: center;
    position: relative;
    box-shadow: var(--sh);
}

.ac:hover {
    box-shadow: var(--sh-md);
    border-color: var(--or-mid);
    transform: translateY(-3px);
}

.ac.on {
    border-color: var(--or);
    box-shadow: 0 0 0 2.5px var(--or-lt);
}

.ac-ico {
    width: 48px;
    height: 48px;
    border-radius: 14px;
    margin: 0 auto 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    transition: transform 0.15s ease;
}

.ac:hover .ac-ico {
    transform: scale(1.05);
}

.ac-lbl {
    font-size: 11px;
    font-weight: 700;
    color: var(--tx);
    line-height: 1.3;
}


.ab-or{background:var(--or)}.ab-r{background:#c0392b}

/* ═══ VIEWS ═══ */
#v-sections{display:none}
.sec-shell{display:flex;flex-direction:column;height:100%}
.sec-topbar{background:var(--wh);border-bottom:1px solid var(--g2);padding:0 24px;height:52px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.sec-back{width:28px;height:28px;border-radius:50%;border:none;background:var(--g1);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--tx2);transition:all .12s;flex-shrink:0;font-family:var(--font)}
.sec-back:hover{background:var(--g2);color:var(--tx)}
.sec-proc-ico{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.sec-proc-nm{font-size:14px;font-weight:900;color:var(--tx);flex:1}
.sec-proc-dom{font-size:11px;color:var(--tx3);margin-top:1px}
.sec-content{flex:1;overflow-y:auto;padding:24px 32px 32px}
.sec-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px}

.sc::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--sc-clr,var(--or));transform:scaleX(0);transform-origin:left;transition:transform .2s}

.sc {
    background: var(--wh);
    border: 1px solid var(--g2);
    border-radius: var(--radlg);
    padding: 24px 16px 20px;
    cursor: pointer;
    transition: all 0.2s ease;
    text-align: center;
    position: relative;
    overflow: hidden;
    box-shadow: var(--sh);
}

.sc::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: var(--sc-clr, var(--or));
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.25s ease;
}

.sc:hover {
    box-shadow: var(--sh-md);
    border-color: var(--sc-clr, var(--or));
    transform: translateY(-4px);
}

.sc:hover::after {
    transform: scaleX(1);
}

.sc-ico-wrap {
    width: 56px;
    height: 56px;
    border-radius: 16px;
    margin: 0 auto 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    transition: all 0.2s ease;
}

.sc:hover .sc-ico-wrap {
    transform: scale(1.08);
    background: var(--sc-clr, var(--or)) !important;
    color: #fff !important;
}

.sc-nm {
    font-size: 13px;
    font-weight: 800;
    color: var(--tx);
    line-height: 1.3;
    letter-spacing: -0.2px;
}

#v-detail{display:none}
.det-shell{display:flex;height:100%}
.det-sb{width:240px;min-width:240px;background:var(--wh);border-right:1px solid var(--g2);display:flex;flex-direction:column;flex-shrink:0}
.det-sb-hdr{height:52px;background:var(--blk);display:flex;align-items:center;padding:0 12px;gap:8px;flex-shrink:0}
.det-sb-back{width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.1);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;color:rgba(255,255,255,.7);flex-shrink:0;transition:all .12s;font-family:var(--font)}
.det-sb-back:hover{background:rgba(255,255,255,.18);color:#fff}
.det-sb-ico{width:22px;height:22px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.det-sb-nm{color:#fff;font-size:12px;font-weight:900;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.det-sb-fade{position:relative;flex:1;overflow:hidden;display:flex;flex-direction:column}
.det-sb-fade::before{content:'';position:absolute;top:0;left:0;right:0;height:16px;background:linear-gradient(var(--wh),transparent);z-index:2;pointer-events:none}
.det-sb-fade::after{content:'';position:absolute;bottom:0;left:0;right:0;height:20px;background:linear-gradient(transparent,var(--wh));z-index:2;pointer-events:none}
.det-sb-scroll{flex:1;overflow-y:auto;padding:6px 0 16px}
.sbi{display:flex;align-items:center;padding:6.5px 13px 6.5px 15px;cursor:pointer;color:var(--tx2);font-size:12px;font-weight:700;border-left:3px solid transparent;transition:all .1s;gap:6px}
.sbi:hover{background:var(--g1);color:var(--tx)}
.sbi.on{background:var(--or-lt);color:var(--or);border-left-color:var(--or)}
.sbi-arr{margin-left:auto;font-size:9px;color:var(--g3);flex-shrink:0;transition:transform .15s}
.sbi.exp .sbi-arr{transform:rotate(90deg)}
.sbi-sub{display:none;background:var(--g1)}
.sbi-sub.open{display:block}
.sbi2{display:flex;align-items:center;padding:5.5px 13px 5.5px 27px;cursor:pointer;color:var(--tx2);font-size:11.5px;font-weight:700;border-left:3px solid transparent;transition:all .1s;gap:5px}
.sbi2:hover{background:var(--g2);color:var(--tx)}
.sbi2.on{color:var(--or);border-left-color:var(--or);background:var(--or-lt)}
.sbi3{display:flex;align-items:center;padding:5px 13px 5px 40px;cursor:pointer;color:var(--tx3);font-size:11px;border-left:3px solid transparent;transition:all .1s}
.sbi3:hover{background:var(--g2);color:var(--tx2)}
.sbi3.on{color:var(--or);background:var(--or-lt)}
.det-main{flex:1;overflow-y:auto;background:var(--bg)}
.det-topbar{background:var(--wh);border-bottom:1px solid var(--g2);padding:0 20px;height:52px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.det-topbar-t{font-size:14px;font-weight:900;color:var(--tx)}
.det-topbar-s{font-size:11.5px;color:var(--tx3);margin-top:1px}
.det-body{padding:20px}
.det-placeholder{background:var(--wh);border:1px solid var(--g2);border-radius:var(--radlg);padding:52px 24px;text-align:center;box-shadow:var(--sh)}
.det-ph-ico{font-size:36px;margin-bottom:12px}
.det-ph-t{font-size:15px;font-weight:900;color:var(--tx);margin-bottom:6px}
.det-ph-s{font-size:12px;color:var(--tx2);max-width:380px;margin:0 auto 20px;line-height:1.6}
.det-ph-tag{display:inline-flex;align-items:center;gap:6px;background:var(--or-lt);border:1px solid var(--or-mid);color:var(--or-dk);border-radius:20px;padding:4px 12px;font-size:11px;font-weight:700}

.logout-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:900;display:none;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.logout-overlay.open{display:flex}
.logout-modal{background:var(--wh);border-radius:16px;padding:28px 28px 22px;width:340px;box-shadow:var(--sh-lg);text-align:center;animation:pop .2s cubic-bezier(.34,1.56,.64,1)}
@keyframes pop{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
.lm-ico{font-size:36px;margin-bottom:12px}
.lm-t{font-size:16px;font-weight:900;color:var(--tx);margin-bottom:6px}
.lm-s{font-size:12px;color:var(--tx2);margin-bottom:20px;line-height:1.5}
.lm-btns{display:flex;gap:8px}
.lm-cancel{flex:1;height:38px;border-radius:8px;border:1.5px solid var(--g2);background:var(--wh);color:var(--tx2);font-family:var(--font);font-size:12.5px;font-weight:700;cursor:pointer;transition:all .12s}
.lm-cancel:hover{background:var(--g1)}
.lm-confirm{flex:1;height:38px;border-radius:8px;border:none;background:#c44d00;color:#fff;font-family:var(--font);font-size:12.5px;font-weight:700;cursor:pointer;transition:all .12s}
.lm-confirm:hover{background:#51565B}

/* Asegurar que las vistas se muestren correctamente */
#v-home { display: block; }
#v-sections { display: none; }
#v-detail { display: none; }

.sec-shell {
    display: flex;
    flex-direction: column;
    height: 100%;

.det-shell {
    display: flex;

.sec-intro {

    color: var(--tx3);

/* Estado de carga inicial */
.loading-init {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 300px;
    color: var(--tx3);
    font-size: 13px;
}

.hide-until-ready {
    opacity: 0;
    transition: opacity 0.2s ease;
}

.hide-until-ready.ready {
    opacity: 1;
}

function getUrlParams() {
    const params = new URLSearchParams(window.location.search);
    const username = params.get('user');
    const companyId = params.get('company');
    const companyName = params.get('companyName');
    const ruc = params.get('ruc');
    const profile = USER_PROFILES[username?.toLowerCase()];
    
    if (profile) {
        return {
            username: username,
            name: profile.name,
            short: profile.short,
            role: profile.role,
            modules: profile.modules,
            companyId: companyId || 'EP',
            companyName: companyName || 'L.HENRIQUES & CIA S.A.',
            ruc: ruc || '0990331928001'
        };
    }
    return {
        username: username || 'usuario',
        name: username || 'Usuario',
        short: (username || 'US').substring(0, 2).toUpperCase(),
        role: 'comercial',
        modules: ['comercial'],
        companyId: companyId || 'EP',
        companyName: companyName || 'L.HENRIQUES & CIA S.A.',
        ruc: ruc || '0990331928001'
    };
}

function getFilteredDomains() {
    if (!currentUserData) return DOMAINS;
    return DOMAINS.filter(domain => currentUserData.modules.includes(domain.key));
}

function hasAccessToOption(procKey, optionLabel) {
    if (!currentUserData) return true;
    if (currentUserData.role === 'admin') return true;
    const userAccess = USER_OPTION_ACCESS[currentUserData.username];
    if (!userAccess) return false;
    const proc = PROCS[procKey];
    if (!proc) return false;
    const allowedOptions = userAccess[proc.domKey];
    if (!allowedOptions) return false;
    if (allowedOptions.includes('all')) return true;
    return allowedOptions.includes(optionLabel);
}

function buildKPIs() {
    const kpisContainer = document.getElementById('hero-kpis');
    if (!kpisContainer) return;
    kpisContainer.innerHTML = '';
    
    // Obtener los IDs de KPIs según el rol
    const kpiIds = ROLE_KPIS[currentUserData?.role] || ROLE_KPIS.admin;
    
    kpiIds.forEach(kpiId => {
        const kpi = MASTER_KPIS[kpiId];
        if (!kpi) return;
        
        const kpiEl = document.createElement('div');
        kpiEl.className = 'kpi';
        kpiEl.onclick = () => { 
            if (kpi.proc && PROCS[kpi.proc]) openProc(kpi.proc); 
        };
        kpiEl.innerHTML = `
            <div class="kpi-v">${kpi.value}</div>
            <div class="kpi-l">${kpi.label}</div>
            <div class="kpi-d ${kpi.changeType}">${kpi.change}</div>
        `;
        kpisContainer.appendChild(kpiEl);
    });
}

    // Actualizar currentUserData
    currentUserData.companyId = co.id;

    currentUserData.ruc = co.ruc;
    
    // Actualizar dropdown (marcar como seleccionada)
    const items = document.querySelectorAll('.ed-item');

function buildSectionCards(pk) {
    const p = PROCS[pk]; 
    if (!p) return;
    const grid = document.getElementById('sec-grid'); 
    if (!grid) return;
    grid.innerHTML = '';
    
    let sectionsToShow = p.menu;
    if (currentUserData?.role !== 'admin') {
        const userAccess = USER_OPTION_ACCESS[currentUserData?.username];
        if (userAccess && userAccess[p.domKey] && !userAccess[p.domKey].includes('all')) {
            const allowedOptions = userAccess[p.domKey];
            sectionsToShow = p.menu.filter(sec => {
                const checkAccess = (items) => {
                    if (!items) return false;
                    for (const item of items) {
                        if (allowedOptions.includes(item.l)) return true;
                        if (item.c && item.c.length && checkAccess(item.c)) return true;
                    }
                    return false;
                };
                return checkAccess(sec.c || []);
            });
        }
    }
    
    if (sectionsToShow.length === 0) {
        grid.innerHTML = '<div style="text-align:center; padding:40px; color:var(--tx3);">No tienes acceso a ninguna sección de este módulo.</div>';
        const introText = document.getElementById('sec-intro');
        if (introText) {
            introText.innerHTML = `${p.domain} › ${p.label} · No tienes secciones asignadas`;
        }
        return;
    }
    
    sectionsToShow.forEach(sec => {
        const ico = SECTION_ICONS[sec.l] || '📌';
        const card = document.createElement('div'); 
        card.className = 'sc'; 
        card.style.setProperty('--sc-clr', p.color);
        card.innerHTML = `
            <div class="sc-ico-wrap" style="background: ${p.color}12; color: ${p.color};">${ico}</div>
            <div class="sc-nm">${sec.l}</div>
        `;
        card.onclick = () => openSection(pk, sec);
        grid.appendChild(card);
    });
}

function buildDetailSidebar(sec, clr) {
    const sb = document.getElementById('det-sb-scroll'); 
    if (!sb) return;
    sb.innerHTML = '';
    
    function renderItems(items, container, depth) {
        if (!items || !items.length) return;
        
        items.forEach(item => {
            const hasAccess = hasAccessToOption(curProc, item.l);
            
            if (item.t === 'M' && item.c && item.c.length) {
                // Filtrar hijos con acceso
                const filteredChildren = item.c.filter(child => hasAccessToOption(curProc, child.l));
                if (filteredChildren.length === 0 && !hasAccess) return;
                
                const group = document.createElement('div');
                const header = document.createElement('div');
                header.className = depth === 0 ? 'sbi' : 'sbi2';
                if (depth > 0) header.style.paddingLeft = (15 + depth * 14) + 'px';
                header.innerHTML = `<span style="flex:1; ${!hasAccess ? 'opacity:0.5;' : ''}">${item.l}</span><span class="sbi-arr">›</span>`;
                
                if (!hasAccess) {
                    header.style.cursor = 'not-allowed';
                    header.style.opacity = '0.5';
                }
                
                const subMenu = document.createElement('div');
                subMenu.className = 'sbi-sub';
                let expanded = false;
                
                header.onclick = (e) => {
                    e.stopPropagation();
                    if (!hasAccess) return;
                    expanded = !expanded;
                    subMenu.classList.toggle('open', expanded);
                    header.classList.toggle('exp', expanded);
                };
                
                group.appendChild(header);
                renderItems(filteredChildren, subMenu, depth + 1);
                group.appendChild(subMenu);
                container.appendChild(group);
            } else {
                if (!hasAccess) return;
                
                const option = document.createElement('div');
                option.className = depth === 0 ? 'sbi' : (depth === 1 ? 'sbi2' : 'sbi3');
                if (depth > 0) option.style.paddingLeft = (15 + depth * 14) + 'px';
                option.innerHTML = `<span style="font-size:7px;color:${clr};flex-shrink:0;margin-right:3px">●</span><span style="flex:1" title="${item.l}">${item.l}</span>`;
                
                // 🔥 ONCLICK CORREGIDO - Usar closure para capturar el valor correcto
                option.onclick = (function(optionLabel) {
                    return function() {
                        // Actualizar títulos
                        const detTitle = document.getElementById('det-t');
                        const detPlaceholderTitle = document.getElementById('det-pt');
                        if (detTitle) detTitle.textContent = optionLabel;
                        if (detPlaceholderTitle) detPlaceholderTitle.textContent = optionLabel;
                        
                        // Obtener el contenedor principal
                        const detBody = document.querySelector('.det-body');
                        if (!detBody) return;
                        
                        // 🔥 SIMULACIÓN: Verificar qué opción se seleccionó
                        if (optionLabel === 'Entrada de Pedidos') {
                            detBody.innerHTML = getFormularioPedidoHTML(optionLabel);
                        } else {
                            // Restaurar placeholder normal
                            detBody.innerHTML = `
                                <div class="det-placeholder">
                                    <div class="det-ph-ico">📋</div>
                                    <div class="det-ph-t">${optionLabel}</div>
                                    <div class="det-ph-s">Formulario: ${optionLabel}. Este formulario está conectado a la base de datos migrada desde Oracle Forms.</div>
                                    <div class="det-ph-tag">📋 Formulario conectado a Oracle Forms migrado</div>
                                </div>
                            `;
                        }
                    };
                })(item.l);
                
                container.appendChild(option);
            }
        });
    }
    
    // Filtrar y renderizar solo las opciones con acceso
    if (sec.c && sec.c.length) {
        const filteredItems = sec.c.filter(item => hasAccessToOption(curProc, item.l));
        renderItems(filteredItems, sb, 0);
    }
}
